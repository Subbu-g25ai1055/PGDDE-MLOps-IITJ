name: Assignment1 CI

on:
  push:
    branches:
      - kernelridge

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          pip install -r MLOps/Assignment1/requirements.txt

      - name: Run Decision Tree Model
        run: |
          python MLOps/Assignment1/train.py

      - name: Run Kernel Ridge Model
        run: |
          python MLOps/Assignment1/train2.py